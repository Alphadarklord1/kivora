name: Feature request
description: Propose a focused product or engineering improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: surface
    attributes:
      label: Product surface
      placeholder: workspace / planner / tools / analytics / settings
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What user problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the behavior, not just the idea
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints or risks
      placeholder: Auth, release, localization, desktop/web, performance, etc.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: List the conditions that make this done

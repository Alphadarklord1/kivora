name: Beta CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag for consistency verification (example: v1.1.2)
        required: false
        type: string
      repo:
        description: owner/repo for release verification
        required: false
        default: Alphadarklord1/studypilot
        type: string

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run beta tests
        run: npm run test:beta

      - name: Validate model manifest
        run: npm run models:manifest:validate -- --manifest=electron/runtime/model-manifest.json --repo=Alphadarklord1/studypilot --allow-placeholders=1

  release-consistency:
    if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release context
        id: ctx
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            REPO="${{ github.repository }}"
          else
            TAG="${{ inputs.tag }}"
            REPO="${{ inputs.repo }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - name: Get release asset list
        id: assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=$(gh release view "${{ steps.ctx.outputs.tag }}" --repo "${{ steps.ctx.outputs.repo }}" --json assets --jq '.assets[].name' | paste -sd "," -)
          echo "assets=$ASSETS" >> "$GITHUB_OUTPUT"
          echo "Release assets: $ASSETS"

      - name: Verify release naming consistency
        run: |
          npm run release:verify -- --tag=${{ steps.ctx.outputs.tag }} --assets='${{ steps.assets.outputs.assets }}'

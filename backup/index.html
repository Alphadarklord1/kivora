<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyPilot</title>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- JS-rendered app root -->
  <div id="app">
    <!-- App mounts here (rendered by app.js). If JS fails, show a tiny fallback. -->
    <noscript>
      <div style="padding:16px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;">
        StudyPilot requires JavaScript to run. Please enable JavaScript and reload.
      </div>
    </noscript>
  </div>

  <!-- PDF.js (LOCAL, blocker-proof) -->
  <script src="./vendor/pdfjs/pdf.min.js"></script>
  <script>
    // Configure worker locally (must be set before you parse PDFs)
    (function configureLocalPdfWorker() {
      if (window.pdfjsLib && window.pdfjsLib.GlobalWorkerOptions) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = './vendor/pdfjs/pdf.worker.min.js';
        console.log('PDF.js local worker configured ✅');
      } else {
        console.error('pdfjsLib not found — make sure ./vendor/pdfjs/pdf.min.js exists and loads');
      }
    })();
  </script>
  <script>
    // Helpful console hint if local PDF.js files are missing
    if (!window.pdfjsLib) {
      console.warn('PDF.js did not load. Confirm these files exist: ./vendor/pdfjs/pdf.min.js and ./vendor/pdfjs/pdf.worker.min.js');
    }
  </script>

  <!-- App logic -->
  <script src="app.js"></script>

</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Full background for maskable icon (safe area is 80% centered) -->
  <rect width="512" height="512" fill="url(#grad)"/>
  <!-- Book icon (centered in safe area) -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Book cover -->
    <path d="M40 0 C20 0 0 20 0 40 L0 280 C0 300 20 320 40 320 L280 320 C300 320 320 300 320 280 L320 40 C320 20 300 0 280 0 Z" fill="white" opacity="0.95"/>
    <!-- Book spine shadow -->
    <path d="M160 0 L160 320" stroke="#e5e7eb" stroke-width="4"/>
    <!-- Pages lines left -->
    <path d="M40 60 L140 60" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 100 L120 100" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 140 L130 140" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 180 L110 180" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 220 L140 220" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 260 L100 260" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <!-- Pages lines right -->
    <path d="M180 60 L280 60" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 100 L260 100" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 140 L270 140" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 180 L250 180" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 220 L280 220" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 260 L240 260" stroke="#d1d5db" stroke-width="8" stroke-linecap="round"/>
    <!-- Bookmark -->
    <path d="M230 0 L230 80 L250 60 L270 80 L270 0" fill="#3b82f6"/>
  </g>
</svg>

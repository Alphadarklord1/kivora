services:
  db:
    image: postgres:16-alpine
    container_name: kivora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: kivora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - kivora-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kivora']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kivora-postgres-data:
